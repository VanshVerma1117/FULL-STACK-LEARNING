<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UltraEdit</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .container {
        justify-items: center;
        align-content: center;
        margin: 15px;
        padding: 10px;
        border: 2px solid black;
        border-radius: 6px;
        height: 6vh;
        flex-wrap: wrap;
      }
      .logobox {
        justify-content: center;
        align-items: center;
      }
      .img{
        height: 40vh;
        width: 40vw;
      }
      nav ul {
        display: flex;
        gap: 20px;
        /* justify-content: center; */
      }
      nav ul li:nth-child(1) {
        padding: 5px;
        /* margin: 6px 0 0 0; */
      }
      nav ul li:nth-child(2) {
        padding: 5px;
      }
      nav ul li:nth-child(3) {
        padding: 5px;
      }
      nav ul li:nth-child(4) {
        padding: 5px;
      }
      nav ul li:nth-child(5) {
        padding: 5px;
      }
      .button {
        border: 2px solid yellow;
        background-color: rgb(233, 215, 21);
        border-radius: 2px;
        border: none;
        position: absolute;
        right: 22vw;
        padding: 7px;
        bottom: 88vh;
      }
      
      main{
        background-color: white;
      }
      .Gallery ul {
        justify-items: center;
        align-items: center;
        gap: 20px;
        height: 35vh;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        margin: 20px;
        list-style: none;
        background-color: lightgrey;
      }

      .boxes {
        height: 20px;
        width: 20px;
        background-color: aqua;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="container">
        <div class="logobox">
            <img src="UE_LOGO.png" alt="">
        </div>
        <ul>
          <li>Products</li>
          <li>Support</li>
          <li>Learn</li>
          <li>Buy</li>
          <li>Company</li>
        </ul>
        <div class="button">DOWNLOAD</div>
      </nav>
    </header>
    <main class="Gallery">
      <div class="boxes">
        <ul>
          <li>ENGLISH</li>
          <li>HINDI</li>
          <li>PORTUGESE</li>
          <li>FRENCH</li>
          <li>ITALIANO</li>
          <li>CHINESE</li>
          <li>JAPANESE</li>
          <li>KOREAN</li>
          <li>SPANISH</li>
        </ul>
      </div>
    </main>
  </body>
</html>
