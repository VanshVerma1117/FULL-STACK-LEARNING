<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      header {
        position: sticky;
        top: 0;
      }
      nav {
        background-color: pink;
        height: 83px;
        position: sticky;
      }
      main {
        background-color: black;
        color: white;
        padding: 34px;
      }
      .container {
        background-color: green;
        margin: 0px 44px;
        height: 90vh;
        text-align: center;
      }
      .box1 {
        background-color: palevioletred;
        height: 70vh;
        width: 45%;
        display: inline-block;
        margin: 35px 25px 25px;
      }
      .box2 {
        background-color: skyblue;
        height: 70vh;
        width: 45%;
        display: inline-block;
        margin: 35px 25px 25px;
      }
      .text-box {
        text-align: center;
        padding: 34px;
        border: 2px solid rgb(255, 255, 255);
        margin: 50px 28vw;
        font-size: 2em;
        border-radius: 30px;
        width: 35vw;
      }
      .orange-box{
        height: 50px;
        width: 50px;
        background-color: orange;
        border-radius: 100px;
        position: fixed;
        bottom: 12px;
        right: 25px;
      }
      footer {
        height: 100px;
        background-color: bisque;
      }
    </style>
  </head>
  <body>
    <header>
      <nav></nav>
    </header>
    <main>
      <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
      </div>
      <div class="text-box">
        <p>WELCOME TO SIGMA BATCH OP</p>
      </div>
      <div class="orange-box"></div>
    </main>
    <footer></footer>
  </body>
</html>
