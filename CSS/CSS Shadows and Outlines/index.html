<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows and Outlines</title>
    <style>
        .box{
            border:  2px solid black;
            padding:  34px;
            box-shadow: 5px 15px 5px rgb(146, 199, 184);
            outline: 2px solid purple;
            outline-offset: 2px;
            border-radius: 100px;
        }
        p{
            text-shadow: 2px 3px 5px #000000;
        }
    </style>
</head>
<body>
    <div class="box">
        i am a box
    </div>
    <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. A, nesciunt.
    </p>
</body>
</html>
