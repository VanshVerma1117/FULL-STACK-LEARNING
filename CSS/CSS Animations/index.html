<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .container{
            background-color: rgb(30, 166, 166);
            height: 80vh;
            width: 40vw;
         }
         .box{
            background-color: aqua;
            height: 10vh;
            width: 5vw;
            /* animation-name: VanshKaAnimation;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-direction: alternate-reverse;
            animation-play-state: paused; */
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            animation: VanshKaAnimation 3s ease-in-out 2s infinite alternate-reverse backwards ,
                       Vansh2 6s ease-out 2s infinite alternate forwards ;
         }
         @keyframes VanshKaAnimation {
            from {
                background-color: blueviolet;
            }
            to{
                background-color: blue;
                transform: translateY(300px) ;
            }
         }
         @keyframes Vansh2{
            10%{
                transform: rotate(45deg);
            }
            20%{
               transform: rotate(90deg);
            }
            30%{
               transform: rotate(135deg);
            }
            40%{
               transform: rotate(180deg);
            }
            50%{
               transform: rotate(225deg);
            }
            60%{
               transform: rotate(270%);
            }
            70%{
               transform: rotate(360deg);
            }
         }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            box
        </div>
    </div>
</body>
</html>
