<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS BOX MODEL</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
      .box {
        background-color: lightgray;
      }
      .box1{
        color: black;
        padding: 10px;
        margin:25px;
        border: 2px solid blue ;
        height: 200px;
        box-sizing: border-box ;
      }
      .box2{
        color: magenta ;
        padding: 10px;
        margin:35px;
        border: 2px solid blue ;
        height: 200px;
        box-sizing: border-box ;
      }
    </style>
  </head>
  <body>
    <div class="box box1">this is a box1</div>
    <div class="box box2">this is a box2</div>
  </body>
</html>
