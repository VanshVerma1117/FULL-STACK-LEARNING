<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Position Property</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      
      .box {
        height: 733px;
        width: 80vw;
        padding: 3px;
        margin: 3px;
        border: 2px solid black;
      }

      .box1 {
        background-color: aqua;
        /* position: sticky;
        top: 0px;
        height: 111px;
        margin: 0;
        padding: 0%; */
        position: absolute;
        top: 0px;
      }

      .box2 {
        background-color: bisque;
        /* position: relative;
        top: 34px;
        left: 56px; */
      }

      .box3 {
        background-color: blue;
        position: fixed;
        bottom: 0px;
        left: 8vw;
        height: 111px;

      }

      .box4 {
        background-color: blueviolet;
      }


      .parent{
        padding: 43px;
        margin: 34px;
        border: 3px solid magenta;
        /* position: relative; */

        /*Exception: transform , filter orprespective properties can also make an element appeared as position */
        /* transform: translate(0); */
        /* filter: invert(0); */
        /* perspective: 0em; */
      }
    </style>
  </head>
  <body>
      <div class="parent">
      <div class="box box1"></div>
      <div class="box box2"></div>
      <div class="box box3"></div>
      <div class="box box4"></div>
      </div>
    </body>
</html>
