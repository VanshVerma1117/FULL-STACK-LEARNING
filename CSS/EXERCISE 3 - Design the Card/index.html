<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Card</title>
    <style>

        *{
            margin: 0;
            padding: 0;
        }
      body {
        background-color: gray;
      }
    
      .card {
          width: 294px;
          height: 444px;
        background-color: white;
        border: 2px solid black;
        border-radius: 7px;
      }
      .image{
        padding: 5px ;
        
      }
      .image img{
        border-radius: 7px;
      }
      .capsule span{
        border: 1px solid black;
        border-radius: 7px;
        margin: 7px;
      }
      .content h1{
        margin: 7px;
      }
      .content p{
        margin: 7px;
      }
      .button{
        padding: 15px 0px;
        text-align: center;
      }
      .button button{
        background-color: skyblue;
        padding: 7px;
        border: none;
        border-radius: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="image">
        <img width="284" src="IMG.avif" alt="" />
      </div>
      <div class="capsule">
        <span>Nature</span>
        <span>Lake</span>
        <div class="content">
            <h1>Lorem, ipsum.</h1>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Quod consectetur praesentium aliquid magnam hic distinctio minima veniam, facere in sunt autem temporibus veritatis?</p>
        </div>
      <div class="button">
        <button>READ MORE</button>
      </div>
    </div>
  </body>
</html>
