<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FORM : HOW DOES IT WORK</title>
  </head>
  <body>
    <h1>FORM TO BAN MEGATRON</h1>
    <form action="post">
      <div>
        <label for="username">ENTER YOUR USERNAME</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter Username"
        />
      </div>
      <div>
        <input type="radio" name="gender" value="male" /> Male
        <input type="radio" name="gender" value="female" /> Female
      </div>
      <div><input type="checkbox" name="agree" value="yes" /> Captcha Box</div>
      <div>
        <label for="ENTER CAPTCHA BELOW">ENTER CAPTCHA</label>
      </div>
      <div>
        <textarea id="ENTER CAPTCHA BELOW" name="CAPTCHA" rows="4" cols="50">
Enter comments here</textarea
        >
      </div>
      <div>
        <select name="country">
          <option value="usa">United States</option>
          <option value="canada">Canada</option>
        </select>
      </div>
      <div><input type="submit" value="Submit" /></div>
      <div><input type="text" pattern="[a-zA-Z0-9]+" />THIS LEADS TO WPO SHOP</div>
    </form>
  </body>
</html>
